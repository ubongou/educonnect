<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <!--
    Hero doodle pattern — approximates the scattered school-supplies line art
    used on the reference hero. Intended as a repeating background tile behind
    the yellow hero. Stroke opacity is tuned low so foreground text + imagery
    stay dominant. All shapes are stroke-only so they inherit currentColor —
    parent can set text-navy to theme.
  -->
  <g fill="none" stroke="currentColor" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.16">

    <!-- Beaker / flask -->
    <g transform="translate(38 50) rotate(-8)">
      <path d="M0 0 L0 12 L-10 36 Q-14 48 -2 48 L18 48 Q30 48 26 36 L16 12 L16 0 Z" />
      <line x1="0" y1="0" x2="16" y2="0" stroke-width="2" />
      <line x1="-4" y1="28" x2="20" y2="28" stroke-dasharray="2 3" />
      <circle cx="6" cy="38" r="1.5" />
      <circle cx="14" cy="42" r="1" />
    </g>

    <!-- Pencil -->
    <g transform="translate(160 40) rotate(30)">
      <path d="M0 0 L44 0 L50 5 L44 10 L0 10 Z" />
      <line x1="8" y1="0" x2="8" y2="10" />
      <line x1="44" y1="0" x2="44" y2="10" />
      <path d="M44 2 L48 5 L44 8" />
    </g>

    <!-- Open book -->
    <g transform="translate(280 30)">
      <path d="M0 8 Q16 0 32 6 L32 34 Q16 28 0 36 Z" />
      <path d="M32 6 Q48 0 64 8 L64 36 Q48 28 32 34 Z" />
      <line x1="32" y1="6" x2="32" y2="34" />
      <line x1="6" y1="14" x2="26" y2="12" />
      <line x1="6" y1="20" x2="26" y2="18" />
      <line x1="38" y1="12" x2="58" y2="14" />
      <line x1="38" y1="18" x2="58" y2="20" />
    </g>

    <!-- Ruler -->
    <g transform="translate(380 70) rotate(62)">
      <rect x="0" y="0" width="60" height="10" rx="1" />
      <line x1="8" y1="0" x2="8" y2="4" />
      <line x1="16" y1="0" x2="16" y2="5" />
      <line x1="24" y1="0" x2="24" y2="4" />
      <line x1="32" y1="0" x2="32" y2="5" />
      <line x1="40" y1="0" x2="40" y2="4" />
      <line x1="48" y1="0" x2="48" y2="5" />
    </g>

    <!-- Star -->
    <g transform="translate(100 140) rotate(10)">
      <path d="M10 0 L13 7 L20 8 L15 13 L16 20 L10 17 L4 20 L5 13 L0 8 L7 7 Z" />
    </g>

    <!-- Scissors -->
    <g transform="translate(200 135) rotate(-20)">
      <circle cx="0" cy="0" r="5" />
      <circle cx="0" cy="18" r="5" />
      <line x1="5" y1="3" x2="28" y2="14" />
      <line x1="5" y1="15" x2="28" y2="4" />
    </g>

    <!-- Paint brush -->
    <g transform="translate(310 150) rotate(34)">
      <path d="M0 0 L28 0 L34 4 L34 10 L28 14 L0 14 Z" />
      <path d="M34 2 L44 6 L44 8 L34 12" />
      <line x1="8" y1="2" x2="8" y2="12" />
      <line x1="18" y1="2" x2="18" y2="12" />
    </g>

    <!-- Graduation cap -->
    <g transform="translate(60 210)">
      <path d="M0 10 L20 0 L40 10 L20 20 Z" />
      <path d="M6 14 L6 24 Q20 30 34 24 L34 14" />
      <line x1="38" y1="11" x2="44" y2="20" />
      <circle cx="44" cy="22" r="2" />
    </g>

    <!-- Flask / conical -->
    <g transform="translate(165 220) rotate(8)">
      <path d="M6 0 L14 0 L14 10 L22 28 Q24 36 16 36 L4 36 Q-4 36 -2 28 L6 10 Z" />
      <line x1="-2" y1="24" x2="22" y2="24" stroke-dasharray="2 3" />
      <circle cx="6" cy="30" r="1.5" />
    </g>

    <!-- Paper plane -->
    <g transform="translate(280 220) rotate(-18)">
      <path d="M0 0 L36 12 L14 18 L10 30 L8 18 Z" />
      <path d="M0 0 L14 18" />
    </g>

    <!-- Apple -->
    <g transform="translate(390 210)">
      <path d="M0 6 Q0 -2 8 -2 Q12 0 14 0 Q16 0 20 -2 Q28 -2 28 6 Q28 22 14 24 Q0 22 0 6 Z" />
      <path d="M13 -4 Q16 -10 22 -8" />
      <path d="M14 0 L14 -4" />
    </g>

    <!-- Clock / circle doodle -->
    <g transform="translate(40 320)">
      <circle cx="16" cy="16" r="14" />
      <line x1="16" y1="16" x2="16" y2="8" />
      <line x1="16" y1="16" x2="22" y2="18" />
      <circle cx="16" cy="16" r="1" fill="currentColor" />
    </g>

    <!-- Calculator -->
    <g transform="translate(130 320) rotate(-6)">
      <rect x="0" y="0" width="32" height="44" rx="3" />
      <rect x="4" y="4" width="24" height="10" />
      <circle cx="8" cy="22" r="1.6" />
      <circle cx="16" cy="22" r="1.6" />
      <circle cx="24" cy="22" r="1.6" />
      <circle cx="8" cy="30" r="1.6" />
      <circle cx="16" cy="30" r="1.6" />
      <circle cx="24" cy="30" r="1.6" />
      <circle cx="8" cy="38" r="1.6" />
      <circle cx="16" cy="38" r="1.6" />
      <circle cx="24" cy="38" r="1.6" />
    </g>

    <!-- Globe -->
    <g transform="translate(230 330)">
      <circle cx="18" cy="18" r="16" />
      <ellipse cx="18" cy="18" rx="16" ry="7" />
      <ellipse cx="18" cy="18" rx="7" ry="16" />
      <line x1="2" y1="18" x2="34" y2="18" />
    </g>

    <!-- Protractor -->
    <g transform="translate(320 340) rotate(-8)">
      <path d="M0 20 A20 20 0 0 1 40 20 L40 22 L0 22 Z" />
      <line x1="10" y1="13" x2="11" y2="10" />
      <line x1="20" y1="5" x2="20" y2="2" />
      <line x1="30" y1="13" x2="29" y2="10" />
    </g>

    <!-- Backpack -->
    <g transform="translate(400 310)">
      <path d="M4 10 Q4 4 10 4 L22 4 Q28 4 28 10 L28 36 Q28 42 22 42 L10 42 Q4 42 4 36 Z" />
      <path d="M10 4 Q10 -2 16 -2 Q22 -2 22 4" />
      <line x1="4" y1="16" x2="28" y2="16" />
      <rect x="9" y="22" width="14" height="10" rx="1" />
    </g>

    <!-- Equation bubble -->
    <g transform="translate(40 420) rotate(-4)">
      <path d="M0 0 L60 0 Q66 0 66 6 L66 22 Q66 28 60 28 L20 28 L12 36 L14 28 L6 28 Q0 28 0 22 Z" />
      <text x="8" y="20" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="currentColor" stroke="none">π r²</text>
    </g>

    <!-- Plus mark -->
    <g transform="translate(170 440)">
      <line x1="0" y1="8" x2="16" y2="8" stroke-width="2" />
      <line x1="8" y1="0" x2="8" y2="16" stroke-width="2" />
    </g>

    <!-- Sparkle -->
    <g transform="translate(230 430)">
      <path d="M10 0 L12 8 L20 10 L12 12 L10 20 L8 12 L0 10 L8 8 Z" />
    </g>

    <!-- Light bulb -->
    <g transform="translate(290 420)">
      <path d="M12 0 Q24 0 24 12 Q24 18 20 22 L20 28 L4 28 L4 22 Q0 18 0 12 Q0 0 12 0 Z" />
      <line x1="4" y1="32" x2="20" y2="32" />
      <line x1="8" y1="36" x2="16" y2="36" />
    </g>

    <!-- Question mark -->
    <g transform="translate(360 430)">
      <path d="M0 6 Q0 -4 10 -4 Q20 -4 20 6 Q20 14 10 14 L10 22" />
      <circle cx="10" cy="30" r="2" fill="currentColor" stroke="none" />
    </g>

  </g>
</svg>
